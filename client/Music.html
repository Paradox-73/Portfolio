<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Record Collection</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="CSS/musicstyle.css">
</head>
<body class="flex flex-col min-h-screen w-full antialiased overflow-x-hidden">
    <div class="ambient-dust"></div>

    <!-- Music Themed Navigation -->
    <nav class="tracklist-nav">
        <button id="nav-toggle" class="nav-toggle">
            <i data-lucide="disc" class="w-4 h-4 animate-spin-slow"></i>
            <span>TRACKLIST</span>
        </button>
        <div id="nav-menu" class="nav-menu">
            <a href="index.html" class="nav-item"><span>01</span> HOME</a>
            <a href="Music.html" class="nav-item active"><span>02</span> MUSIC</a>
            <a href="MoviesTV.html" class="nav-item"><span>03</span> MOVIES & TV</a>
            <a href="Games.html" class="nav-item"><span>04</span> GAMES</a>
            <a href="Literature.html" class="nav-item"><span>05</span> LITERATURE</a>
            <a href="Food.html" class="nav-item"><span>06</span> FOOD</a>
            <a href="Travel.html" class="nav-item"><span>07</span> TRAVEL</a>
            <a href="art.html" class="nav-item"><span>08</span> ART</a>
            <a href="sport.html" class="nav-item"><span>09</span> SPORTS</a>
            <a href="Projects.html" class="nav-item"><span>10</span> PROJECTS</a>
        </div>
    </nav>

    <!-- MAIN ROOM -->
    <div class="flex-1 flex flex-row w-full min-h-screen relative z-10 p-4 md:p-8 justify-between items-center pointer-events-none pb-24">
        
        <!-- LEFT: ARTIST POLAROIDS -->
        <div class="hidden lg:flex w-32 xl:w-48 min-h-full polaroid-col items-center pl-4" id="artists-col">
            <!-- Artist Polaroids Injected Here -->
        </div>

        <!-- CENTER: CRATE & TURNTABLE -->
        <div class="flex-1 flex flex-col xl:flex-row justify-center items-center gap-16 pointer-events-auto min-h-full max-w-5xl mx-auto py-12">
            
            <!-- THE CRATE AREA -->
            <div class="w-full xl:w-[400px] flex flex-col items-center">
                <div class="text-center mb-10">
                    <h1 class="text-3xl md:text-4xl font-bold mb-2 tracking-wide text-[#f4ebd8]">Heavy Rotation</h1>
                    <p class="typewriter text-xs text-[#a89f91] opacity-80">Crate Digging. Pulled up to view.</p>
                </div>

                <!-- Scrollable Crate -->
                <div class="crate-scene mb-4 mx-auto cursor-ns-resize" id="crate-scene">
                    <div class="crate-container" id="crate">
                        <div class="crate-back"></div>
                        <!-- Records injected here via JS -->
                        <div class="crate-front">
                            <div id="collection-trigger" class="crate-label cursor-pointer hover:scale-110 transition-transform">COLLECTION</div>
                            <div id="crate-active-title" class="absolute bottom-4 w-full text-center typewriter text-[10px] text-[#f4ebd8] opacity-60 px-2 truncate"></div>
                        </div>
                    </div>
                </div>
                
                <p class="handwriting text-neutral-400 mt-12 flex items-center gap-2 text-xl">
                    <i data-lucide="mouse-pointer-2" class="w-5 h-5"></i> Scroll down to pull albums up
                </p>
            </div>

            <!-- THE TURNTABLE PLAYER -->
            <div class="relative w-[340px] md:w-[420px] aspect-square turntable-base flex items-center justify-center flex-shrink-0">
                
                <!-- Platter -->
                <div class="w-[85%] h-[85%] platter rounded-full relative flex items-center justify-center shadow-2xl">
                    
                    <!-- THE PICTURE DISC VINYL -->
                    <div id="active-vinyl" class="absolute inset-0 w-full h-full vinyl-texture flex items-center justify-center opacity-0 pointer-events-none origin-center">
                        <div class="absolute inset-0 vinyl-reflection pointer-events-none"></div>
                        
                        <!-- Play Overlay -->
                        <div class="play-overlay">
                            <i data-lucide="play" class="w-12 h-12 text-white fill-current"></i>
                        </div>

                        <!-- Tiny center hole -->
                        <div class="w-2.5 h-2.5 bg-[#111] rounded-full shadow-inner z-10"></div>
                    </div>

                    <!-- Spindle -->
                    <div class="absolute w-3.5 h-3.5 bg-zinc-400 rounded-full shadow-lg flex items-center justify-center z-30">
                        <div class="w-1.5 h-1.5 bg-zinc-800 rounded-full"></div>
                    </div>
                </div>

                <!-- Realistic Tonearm -->
                <div id="tonearm" class="absolute right-[6%] top-[6%] w-16 h-[65%] origin-[32px_32px] rotate-[-25deg] z-40 drop-shadow-2xl pointer-events-none">
                    <div class="absolute -top-8 left-[22px] w-5 h-10 bg-zinc-800 rounded shadow-md border border-zinc-600"></div>
                    <div class="absolute top-0 left-0 w-16 h-16 rounded-full bg-zinc-300 border-[4px] border-zinc-400 flex items-center justify-center shadow-lg">
                        <div class="w-8 h-8 rounded-full bg-zinc-800 shadow-inner border border-zinc-600"></div>
                    </div>
                    <div class="absolute top-12 left-[30px] w-1.5 h-[80%] bg-gradient-to-r from-zinc-200 via-white to-zinc-400 rounded-full shadow-sm border-x border-zinc-400"></div>
                    <div class="absolute bottom-0 left-[18px] w-6 h-14 bg-zinc-800 rounded-sm rotate-[22deg] shadow-xl border border-zinc-700 origin-top flex justify-center">
                        <div class="absolute bottom-1 w-1 h-2 bg-red-500 rounded-full shadow-[0_0_4px_rgba(239,68,68,0.8)]"></div>
                    </div>
                </div>
                
            </div>
        </div>

        <!-- RIGHT: LYRIC POLAROIDS -->
        <div class="hidden lg:flex w-36 xl:w-56 min-h-full polaroid-col items-center pr-4" id="lyrics-col">
            <!-- Lyric Polaroids Injected Here -->
        </div>

    </div>

    <!-- LOWER SECTION -->
    <div class="h-16 wood-desk w-full mt-auto relative z-20"></div>

    <!-- COLLECTION OVERLAY -->
    <div id="collection-overlay" class="fixed inset-0 z-[6000] hidden bg-black/95 flex flex-col p-0 overflow-y-auto pointer-events-auto">
        <div class="w-full flex flex-col min-h-full">
            <div class="flex justify-between items-center p-8 md:p-12 border-b border-white/10">
                <div>
                    <h2 class="text-3xl md:text-5xl font-bold tracking-tight text-[#f4ebd8] uppercase">The Archive</h2>
                    <p class="typewriter text-[#a89f91] text-xs mt-2 opacity-60">Complete record collection / Click to play</p>
                </div>
                <button id="close-collection" class="p-4 hover:bg-white/10 rounded-full transition-colors text-[#f4ebd8]">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>
            <div id="album-grid" class="grid grid-cols-7 gap-0 border-l border-t border-white/5 content-start">
                <!-- Tiles Injected via JS -->
            </div>
        </div>
    </div>

    <script src="Javascript/musicscript.js"></script>
</body>
</html>
